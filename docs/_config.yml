footer_content: "RAG Chatbot Workshop &mdash; Microsoft Indonesia"

exclude:
  - "*.drawio"
  - "*.bkp"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
