title: "RAG Chatbot on Azure"
description: "Workshop — Build a production-ready RAG chatbot with vLLM, Qdrant & Azure CLI"
baseurl: "/Chatbot-AzureInfra"
url: "https://ibranibeny.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: light
search_enabled: true
search.button: true

heading_anchors: true
permalink: pretty

aux_links:
  "GitHub Repo":
    - "https://github.com/ibranibeny/Chatbot-AzureInfra"

aux_links_new_tab: true

nav_sort: case_insensitive
